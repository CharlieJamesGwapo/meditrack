<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Display - MediTrack</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/logo.jpg">
    <link rel="manifest" href="../assets/images/site.webmanifest">
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; }
        body { overflow-x: hidden; background: #f0fdf4; }
        
        /* QR Code Animation */
        .qr-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        
        .qr-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(16, 185, 129, 0.1), transparent);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        
        /* Pulse animation */
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        
        /* Card hover effects */
        .action-card { transition: all 0.3s ease; }
        .action-card:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(16, 185, 129, 0.2); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f0fdf4; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #059669; }
        
        /* Print styles */
        @media print {
            .no-print { display: none !important; }
            .qr-container { 
                box-shadow: none; 
                border: 2px solid #000; 
                page-break-inside: avoid;
            }
        }
        
        /* SweetAlert2 custom styling */
        .swal2-popup {
            border-radius: 1rem;
        }
        .swal2-confirm {
            background-color: #10b981 !important;
        }
        .swal2-cancel {
            background-color: #6b7280 !important;
        }
    </style>
    <script src="../js/auth-check.js"></script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full overflow-hidden bg-green-100 p-1 shadow-md mr-3">
                        <img src="../assets/images/logo.jpg" alt="MediTrack" class="w-full h-full object-cover rounded-full">
                    </div>
                    <span class="text-xl font-bold text-gray-800">MediTrack</span>
                    <span class="ml-2 text-sm text-green-600 font-semibold">QR Code Display</span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="hidden sm:flex items-center space-x-2 text-gray-600">
                        <i class="fas fa-clock text-green-600"></i>
                        <span id="realTimeClock" class="text-sm font-medium"></span>
                    </div>
                    <span class="pulse px-3 py-1 text-xs rounded-full bg-green-100 text-green-700 font-semibold">
                        <i class="fas fa-circle text-xs mr-1"></i>Online
                    </span>
                    <a href="patient-dashboard.html" class="text-green-600 hover:text-green-700">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="bg-gradient-to-r from-green-600 to-green-700 rounded-xl shadow-2xl p-6 text-white mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2">QR Code Display</h1>
                    <p class="text-green-100">Generate and manage QR codes for appointments</p>
                </div>
                <div class="text-center">
                    <i class="fas fa-qrcode text-6xl text-green-200"></i>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- QR Code Display -->
            <div class="qr-container">
                <h2 class="text-2xl font-bold mb-6 text-center">Appointment QR Code</h2>
                
                <!-- QR Code Image -->
                <div id="qrCodeDisplay" class="text-center mb-6">
                    <div class="bg-gray-100 rounded-lg p-8">
                        <i class="fas fa-qrcode text-8xl text-gray-400 mb-4"></i>
                        <p class="text-gray-600">Select an appointment to generate QR code</p>
                    </div>
                </div>
                
                <!-- Appointment Info -->
                <div id="appointmentInfo" class="hidden">
                    <div class="bg-gray-50 rounded-lg p-4 mb-4">
                        <h3 class="font-semibold text-gray-800 mb-2">Appointment Details</h3>
                        <div id="appointmentDetails" class="text-sm text-gray-600 space-y-1">
                            <!-- Details will be populated here -->
                        </div>
                    </div>
                    
                    <!-- QR Code Actions -->
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="downloadQRCode()" class="action-card bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-semibold">
                            <i class="fas fa-download mr-2"></i>Download
                        </button>
                        <button onclick="printQRCode()" class="action-card bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-semibold">
                            <i class="fas fa-print mr-2"></i>Print
                        </button>
                        <button onclick="copyQRCode()" class="action-card bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 transition font-semibold">
                            <i class="fas fa-copy mr-2"></i>Copy
                        </button>
                        <button onclick="shareQRCode()" class="action-card bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition font-semibold">
                            <i class="fas fa-share mr-2"></i>Share
                        </button>
                    </div>
                </div>
            </div>

            <!-- Appointment Selection -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-2xl font-bold mb-6 flex items-center">
                    <i class="fas fa-calendar-alt text-green-600 mr-3"></i>
                    Select Appointment
                </h2>
                
                <!-- Search -->
                <div class="mb-4">
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="appointmentSearch" placeholder="Search appointments..." 
                            class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent">
                    </div>
                </div>
                
                <!-- Appointments List -->
                <div id="appointmentsList" class="space-y-3 max-h-96 overflow-y-auto">
                    <div class="text-center py-8">
                        <i class="fas fa-spinner fa-spin text-4xl text-green-600 mb-4"></i>
                        <p class="text-gray-600">Loading appointments...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent QR Codes -->
        <div class="bg-white rounded-xl shadow-md p-6 mt-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center">
                <i class="fas fa-history text-purple-600 mr-3"></i>
                Recent QR Codes
            </h2>
            
            <div id="recentQRCodes" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="text-center py-8 col-span-full">
                    <i class="fas fa-history text-4xl text-gray-300 mb-2"></i>
                    <p class="text-gray-600">No recent QR codes</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Real-Time Clock
        function updateClock() {
            const now = new Date();
            const options = { 
                weekday: 'short', 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            document.getElementById('realTimeClock').textContent = now.toLocaleString('en-US', options);
        }
        
        updateClock();
        setInterval(updateClock, 1000);

        // Global variables
        let currentAppointment = null;
        let currentQRCode = null;
        let appointments = [];
        let recentQRCodes = JSON.parse(localStorage.getItem('recentQRCodes') || '[]');

        // Initialize
        window.addEventListener('load', () => {
            loadAppointments();
            displayRecentQRCodes();
        });

        // Load appointments
        async function loadAppointments() {
            try {
                const response = await fetch('../api/appointments/list.php');
                const data = await response.json();
                
                if (data.success) {
                    appointments = data.appointments;
                    displayAppointments(appointments);
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                console.error('Error loading appointments:', error);
                document.getElementById('appointmentsList').innerHTML = `
                    <div class="text-center py-8">
                        <i class="fas fa-exclamation-triangle text-4xl text-red-300 mb-2"></i>
                        <p class="text-red-600">Error loading appointments</p>
                    </div>
                `;
            }
        }

        // Display appointments
        function displayAppointments(appointmentList) {
            const container = document.getElementById('appointmentsList');
            
            if (appointmentList.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8">
                        <i class="fas fa-calendar-times text-4xl text-gray-300 mb-2"></i>
                        <p class="text-gray-600">No appointments found</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = appointmentList.map(apt => `
                <div class="bg-gray-50 rounded-lg p-4 hover:bg-gray-100 transition cursor-pointer border-2 border-transparent hover:border-green-300" 
                     onclick="selectAppointment(${apt.id})">
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <h5 class="font-semibold text-gray-800">${apt.patient_name || 'Appointment'}</h5>
                                <span class="px-2 py-1 text-xs rounded-full ${
                                    apt.status === 'confirmed' ? 'bg-green-100 text-green-700' :
                                    apt.status === 'pending' ? 'bg-yellow-100 text-yellow-700' :
                                    apt.status === 'completed' ? 'bg-blue-100 text-blue-700' :
                                    'bg-red-100 text-red-700'
                                }">
                                    ${apt.status}
                                </span>
                            </div>
                            <div class="text-sm text-gray-600">
                                <div><i class="fas fa-user-md w-4 text-green-600"></i> Dr. ${apt.doctor_name}</div>
                                <div><i class="fas fa-calendar w-4 text-blue-600"></i> ${formatDate(apt.appointment_date)}</div>
                                <div><i class="fas fa-clock w-4 text-purple-600"></i> ${apt.appointment_time}</div>
                            </div>
                        </div>
                        ${apt.token_hash ? `
                        <div class="ml-4">
                            <i class="fas fa-qrcode text-green-600 text-2xl"></i>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Search appointments
        document.getElementById('appointmentSearch').addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            
            if (!query) {
                displayAppointments(appointments);
                return;
            }
            
            const filtered = appointments.filter(apt => {
                return (apt.patient_name && apt.patient_name.toLowerCase().includes(query)) ||
                       (apt.doctor_name && apt.doctor_name.toLowerCase().includes(query)) ||
                       (apt.reason && apt.reason.toLowerCase().includes(query)) ||
                       (apt.appointment_date && apt.appointment_date.includes(query));
            });
            
            displayAppointments(filtered);
        });

        // Select appointment
        async function selectAppointment(appointmentId) {
            try {
                const response = await fetch('../api/appointments/generate-qr.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ appointment_id: appointmentId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentAppointment = data.appointment;
                    currentQRCode = data.qr_code;
                    displayQRCode(data);
                    addToRecentQRCodes(data);
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            } catch (error) {
                console.error('Error generating QR code:', error);
                Swal.fire('Error', 'Failed to generate QR code', 'error');
            }
        }

        // Display QR code
        function displayQRCode(data) {
            const qrDisplay = document.getElementById('qrCodeDisplay');
            const appointmentInfo = document.getElementById('appointmentInfo');
            const appointmentDetails = document.getElementById('appointmentDetails');
            
            // Display QR code
            qrDisplay.innerHTML = `
                <div class="bg-white rounded-lg p-4 inline-block">
                    <img src="${data.qr_code.qr_image}" alt="QR Code" class="w-64 h-64 mx-auto">
                </div>
                <div class="mt-4 text-center">
                    <p class="text-sm text-gray-600">Expires: ${formatDate(data.qr_code.expires_at)}</p>
                    <p class="text-xs text-gray-500 mt-1">Method: ${data.qr_code.method}</p>
                </div>
            `;
            
            // Display appointment details
            appointmentDetails.innerHTML = `
                <div><strong>Patient:</strong> ${data.appointment.patient_name}</div>
                <div><strong>Doctor:</strong> Dr. ${data.appointment.doctor_name}</div>
                <div><strong>Date:</strong> ${formatDate(data.appointment.appointment_date)}</div>
                <div><strong>Time:</strong> ${data.appointment.appointment_time}</div>
                <div><strong>Status:</strong> <span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-700">${data.appointment.status}</span></div>
                ${data.appointment.reason ? `<div><strong>Reason:</strong> ${data.appointment.reason}</div>` : ''}
            `;
            
            appointmentInfo.classList.remove('hidden');
        }

        // QR Code Actions
        function downloadQRCode() {
            if (!currentQRCode) return;
            
            const link = document.createElement('a');
            link.href = currentQRCode.qr_image;
            link.download = `qr_code_${currentAppointment.id}_${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            Swal.fire('Success', 'QR code downloaded successfully', 'success');
        }

        function printQRCode() {
            if (!currentQRCode) return;
            
            window.print();
        }

        function copyQRCode() {
            if (!currentQRCode) return;
            
            // Copy the token hash to clipboard
            navigator.clipboard.writeText(currentQRCode.token_hash).then(() => {
                Swal.fire('Success', 'QR code token copied to clipboard', 'success');
            }).catch(() => {
                Swal.fire('Error', 'Failed to copy QR code', 'error');
            });
        }

        function shareQRCode() {
            if (!currentQRCode) return;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Appointment QR Code',
                    text: `QR code for appointment with Dr. ${currentAppointment.doctor_name} on ${formatDate(currentAppointment.appointment_date)}`,
                    url: window.location.href
                }).then(() => {
                    console.log('QR code shared successfully');
                }).catch(() => {
                    copyQRCode();
                });
            } else {
                copyQRCode();
            }
        }

        // Recent QR Codes
        function addToRecentQRCodes(data) {
            const qrCode = {
                appointment: data.appointment,
                qr_code: data.qr_code,
                timestamp: new Date().toISOString()
            };
            
            recentQRCodes.unshift(qrCode);
            if (recentQRCodes.length > 6) {
                recentQRCodes = recentQRCodes.slice(0, 6);
            }
            
            localStorage.setItem('recentQRCodes', JSON.stringify(recentQRCodes));
            displayRecentQRCodes();
        }

        function displayRecentQRCodes() {
            const container = document.getElementById('recentQRCodes');
            
            if (recentQRCodes.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 col-span-full">
                        <i class="fas fa-history text-4xl text-gray-300 mb-2"></i>
                        <p class="text-gray-600">No recent QR codes</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = recentQRCodes.map(qr => `
                <div class="bg-gray-50 rounded-lg p-4 hover:bg-gray-100 transition cursor-pointer" 
                     onclick="displayRecentQR(${recentQRCodes.indexOf(qr)})">
                    <div class="flex items-center space-x-3">
                        <img src="${qr.qr_code.qr_image}" alt="QR Code" class="w-16 h-16 rounded">
                        <div class="flex-1">
                            <div class="font-semibold text-gray-800">${qr.appointment.patient_name}</div>
                            <div class="text-sm text-gray-600">Dr. ${qr.appointment.doctor_name}</div>
                            <div class="text-xs text-gray-500">${formatDate(qr.appointment.appointment_date)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayRecentQR(index) {
            const qrData = recentQRCodes[index];
            currentAppointment = qrData.appointment;
            currentQRCode = qrData.qr_code;
            displayQRCode(qrData);
        }

        // Helper functions
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
    </script>
</body>
</html>
