<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MediTrack</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/logo.jpg">
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        h1, h2, h3 {
            font-family: 'Poppins', sans-serif;
        }
        
        .login-gradient {
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #ecfdf5 100%);
        }
        
        .logo-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(5, 150, 105, 0.3);
            border: 3px solid #10b981;
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        
        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(5, 150, 105, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(5, 150, 105, 0.5);
        }
        
        .password-strength {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        
        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #10b981; width: 100%; }
        
        .input-error {
            border-color: #ef4444 !important;
            animation: shake 0.3s;
        }
        
        .input-success {
            border-color: #10b981 !important;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .match-indicator {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .match-success { color: #10b981; }
        .match-error { color: #ef4444; }
        
        /* Responsive adjustments */
        @media (max-width: 640px) {
            .logo-container {
                width: 60px;
                height: 60px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .card {
                padding: 1.5rem 1rem;
            }
            
            .input-field {
                font-size: 16px; /* Prevent zoom on iOS */
            }
        }
    </style>
</head>
<body class="login-gradient min-h-screen">
    <div class="min-h-screen flex items-center justify-center py-8 px-4">
        <div class="max-w-md w-full">
            <!-- Logo & Header -->
            <div class="text-center mb-8">
                <a href="login.html" class="inline-block mb-6">
                    <div class="logo-container mx-auto">
                        <img src="../assets/images/logo.jpg" alt="MediTrack Logo">
                    </div>
                </a>
                <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Reset Password</h1>
                <p class="text-gray-600 text-sm">Create a new secure password</p>
            </div>

            <!-- Form Card -->
            <div class="card py-8 px-6 md:px-8">
                <div class="mb-6 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                        <i class="fas fa-lock text-green-600 text-2xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-900 mb-2">Create New Password</h2>
                    <p class="text-sm text-gray-600">Your new password must be different from previous passwords</p>
                </div>

                <form id="resetPasswordForm" class="space-y-5">
                    <div>
                        <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input id="newPassword" name="newPassword" type="password" required 
                                   class="input-field appearance-none block w-full pl-10 pr-12 py-3 rounded-xl placeholder-gray-400 focus:outline-none"
                                   placeholder="Enter new password"
                                   minlength="8">
                            <button type="button" id="toggleNewPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-green-600">
                                <i class="fas fa-eye" id="eyeIconNew"></i>
                            </button>
                        </div>
                        <div class="mt-2 bg-gray-100 rounded-full h-1 overflow-hidden">
                            <div id="passwordStrength" class="password-strength"></div>
                        </div>
                        <p id="strengthText" class="mt-1 text-xs text-gray-500">Minimum 8 characters required</p>
                    </div>

                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-gray-400"></i>
                            </div>
                            <input id="confirmPassword" name="confirmPassword" type="password" required 
                                   class="input-field appearance-none block w-full pl-10 pr-12 py-3 rounded-xl placeholder-gray-400 focus:outline-none"
                                   placeholder="Confirm new password"
                                   minlength="8">
                            <button type="button" id="toggleConfirmPassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-green-600">
                                <i class="fas fa-eye" id="eyeIconConfirm"></i>
                            </button>
                        </div>
                        <div id="matchIndicator" class="match-indicator hidden"></div>
                    </div>

                    <button type="submit" id="resetBtn"
                            class="btn-primary w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-xl text-base font-bold text-white focus:outline-none">
                        <span id="resetText">
                            <i class="fas fa-check-circle mr-2"></i>
                            Reset Password
                        </span>
                        <span id="resetSpinner" class="hidden">
                            <i class="fas fa-spinner fa-spin mr-2"></i>
                            Resetting...
                        </span>
                    </button>
                </form>

                <!-- Password Requirements -->
                <div class="mt-6 p-4 bg-green-50 rounded-xl border border-green-200">
                    <div class="text-xs text-green-800">
                        <p class="font-semibold mb-2">Password Requirements:</p>
                        <ul class="space-y-1">
                            <li id="req-length" class="flex items-center gap-2">
                                <i class="fas fa-circle text-gray-400 text-xs"></i>
                                <span>At least 8 characters</span>
                            </li>
                            <li id="req-uppercase" class="flex items-center gap-2">
                                <i class="fas fa-circle text-gray-400 text-xs"></i>
                                <span>One uppercase letter</span>
                            </li>
                            <li id="req-lowercase" class="flex items-center gap-2">
                                <i class="fas fa-circle text-gray-400 text-xs"></i>
                                <span>One lowercase letter</span>
                            </li>
                            <li id="req-number" class="flex items-center gap-2">
                                <i class="fas fa-circle text-gray-400 text-xs"></i>
                                <span>One number</span>
                            </li>
                            <li id="req-special" class="flex items-center gap-2">
                                <i class="fas fa-circle text-gray-400 text-xs"></i>
                                <span>One special character</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if reset token exists
        const resetToken = sessionStorage.getItem('reset_token');
        const email = sessionStorage.getItem('reset_email');
        
        if (!resetToken || !email) {
            Swal.fire({
                icon: 'error',
                title: 'Invalid Access',
                text: 'Please start the password reset process from the beginning',
                confirmButtonText: 'OK'
            }).then(() => {
                window.location.href = 'forgot-password.html';
            });
        }

        // Password toggle
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const toggleNewPassword = document.getElementById('toggleNewPassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const eyeIconNew = document.getElementById('eyeIconNew');
        const eyeIconConfirm = document.getElementById('eyeIconConfirm');

        toggleNewPassword.addEventListener('click', () => {
            const type = newPasswordInput.type === 'password' ? 'text' : 'password';
            newPasswordInput.type = type;
            eyeIconNew.classList.toggle('fa-eye');
            eyeIconNew.classList.toggle('fa-eye-slash');
        });

        toggleConfirmPassword.addEventListener('click', () => {
            const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
            confirmPasswordInput.type = type;
            eyeIconConfirm.classList.toggle('fa-eye');
            eyeIconConfirm.classList.toggle('fa-eye-slash');
        });

        // Password strength indicator
        const passwordStrength = document.getElementById('passwordStrength');
        const requirements = {
            length: document.getElementById('req-length'),
            uppercase: document.getElementById('req-uppercase'),
            lowercase: document.getElementById('req-lowercase'),
            number: document.getElementById('req-number'),
            special: document.getElementById('req-special')
        };

        function updateRequirement(element, met) {
            const icon = element.querySelector('i');
            if (met) {
                icon.classList.remove('fa-circle', 'text-gray-400');
                icon.classList.add('fa-check-circle', 'text-green-600');
            } else {
                icon.classList.remove('fa-check-circle', 'text-green-600');
                icon.classList.add('fa-circle', 'text-gray-400');
            }
        }

        const strengthText = document.getElementById('strengthText');
        const matchIndicator = document.getElementById('matchIndicator');

        newPasswordInput.addEventListener('input', () => {
            const password = newPasswordInput.value;
            let strength = 0;
            
            const hasLength = password.length >= 8;
            const hasUppercase = /[A-Z]/.test(password);
            const hasLowercase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[^a-zA-Z0-9]/.test(password);
            
            updateRequirement(requirements.length, hasLength);
            updateRequirement(requirements.uppercase, hasUppercase);
            updateRequirement(requirements.lowercase, hasLowercase);
            updateRequirement(requirements.number, hasNumber);
            updateRequirement(requirements.special, hasSpecial);
            
            if (hasLength) strength++;
            if (hasUppercase) strength++;
            if (hasLowercase) strength++;
            if (hasNumber) strength++;
            if (hasSpecial) strength++;
            
            passwordStrength.className = 'password-strength';
            
            // Update strength indicator and text
            if (password.length === 0) {
                strengthText.textContent = 'Minimum 8 characters required';
                strengthText.className = 'mt-1 text-xs text-gray-500';
            } else if (strength <= 2) {
                passwordStrength.classList.add('strength-weak');
                strengthText.textContent = '⚠️ Weak password - Add more variety';
                strengthText.className = 'mt-1 text-xs text-red-600';
                newPasswordInput.classList.add('input-error');
                newPasswordInput.classList.remove('input-success');
            } else if (strength <= 4) {
                passwordStrength.classList.add('strength-medium');
                strengthText.textContent = '⚡ Medium strength - Almost there!';
                strengthText.className = 'mt-1 text-xs text-yellow-600';
                newPasswordInput.classList.remove('input-error', 'input-success');
            } else {
                passwordStrength.classList.add('strength-strong');
                strengthText.textContent = '✓ Strong password!';
                strengthText.className = 'mt-1 text-xs text-green-600';
                newPasswordInput.classList.add('input-success');
                newPasswordInput.classList.remove('input-error');
            }
            
            // Check password match if confirm field has value
            checkPasswordMatch();
        });

        // Real-time password matching
        confirmPasswordInput.addEventListener('input', checkPasswordMatch);

        function checkPasswordMatch() {
            const password = newPasswordInput.value;
            const confirm = confirmPasswordInput.value;
            
            if (confirm.length === 0) {
                matchIndicator.classList.add('hidden');
                confirmPasswordInput.classList.remove('input-error', 'input-success');
                return;
            }
            
            matchIndicator.classList.remove('hidden');
            
            if (password === confirm && confirm.length >= 8) {
                matchIndicator.textContent = '✓ Passwords match';
                matchIndicator.className = 'match-indicator match-success';
                confirmPasswordInput.classList.add('input-success');
                confirmPasswordInput.classList.remove('input-error');
            } else {
                matchIndicator.textContent = '✗ Passwords do not match';
                matchIndicator.className = 'match-indicator match-error';
                confirmPasswordInput.classList.add('input-error');
                confirmPasswordInput.classList.remove('input-success');
            }
        }

        // Form submission
        const form = document.getElementById('resetPasswordForm');
        const resetBtn = document.getElementById('resetBtn');
        const resetText = document.getElementById('resetText');
        const resetSpinner = document.getElementById('resetSpinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Comprehensive validation with specific error messages
            if (newPassword.length < 8) {
                Swal.fire({
                    icon: 'error',
                    title: 'Password Too Short',
                    text: 'Password must be at least 8 characters long',
                    confirmButtonColor: '#10b981'
                });
                newPasswordInput.focus();
                return;
            }

            if (!/[A-Z]/.test(newPassword)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Missing Uppercase Letter',
                    text: 'Password must contain at least one uppercase letter (A-Z)',
                    confirmButtonColor: '#10b981'
                });
                newPasswordInput.focus();
                return;
            }

            if (!/[a-z]/.test(newPassword)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Missing Lowercase Letter',
                    text: 'Password must contain at least one lowercase letter (a-z)',
                    confirmButtonColor: '#10b981'
                });
                newPasswordInput.focus();
                return;
            }

            if (!/[0-9]/.test(newPassword)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Missing Number',
                    text: 'Password must contain at least one number (0-9)',
                    confirmButtonColor: '#10b981'
                });
                newPasswordInput.focus();
                return;
            }

            if (!/[^a-zA-Z0-9]/.test(newPassword)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Missing Special Character',
                    text: 'Password must contain at least one special character (!@#$%^&*)',
                    confirmButtonColor: '#10b981'
                });
                newPasswordInput.focus();
                return;
            }

            if (newPassword !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'Passwords Don\'t Match',
                    text: 'Please make sure both passwords are identical',
                    confirmButtonColor: '#10b981'
                });
                confirmPasswordInput.focus();
                return;
            }

            // Show loading state
            Swal.fire({
                title: 'Resetting Password...',
                html: 'Please wait while we update your password',
                allowOutsideClick: false,
                allowEscapeKey: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            // Disable form
            resetBtn.disabled = true;
            resetText.classList.add('hidden');
            resetSpinner.classList.remove('hidden');

            try {
                const response = await fetch('../api/auth/reset-password.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        reset_token: resetToken,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Clear session storage
                    sessionStorage.removeItem('reset_email');
                    sessionStorage.removeItem('reset_token');

                    Swal.fire({
                        icon: 'success',
                        title: 'Password Reset Successful!',
                        html: '<p class="text-lg mb-2">Your password has been updated successfully.</p><p class="text-sm text-gray-600">You can now login with your new password.</p>',
                        confirmButtonText: 'Go to Login',
                        confirmButtonColor: '#10b981',
                        allowOutsideClick: false
                    }).then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Reset Failed',
                        text: data.message || 'Failed to reset password. Please try again.',
                        confirmButtonColor: '#10b981'
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Network Error',
                    html: '<p>Unable to connect to the server.</p><p class="text-sm text-gray-600 mt-2">Please check your internet connection and try again.</p>',
                    confirmButtonColor: '#10b981'
                });
            } finally {
                resetBtn.disabled = false;
                resetText.classList.remove('hidden');
                resetSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
