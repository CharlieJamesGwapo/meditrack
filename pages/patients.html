<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients Management - MediTrack</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/logo.jpg">
    <link rel="manifest" href="../assets/images/site.webmanifest">
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; }
        body { overflow-x: hidden; }
        
        .sidebar { transition: transform 0.3s ease; z-index: 40; }
        .sidebar-overlay { transition: opacity 0.3s ease; }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
        
        .patient-card {
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%);
        }
        .patient-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }
        
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        
        .nav-item { transition: all 0.2s ease; }
        .nav-item.active { background-color: rgba(255,255,255,0.2); }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #059669; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Sidebar Overlay (Mobile) -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden sidebar-overlay"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar fixed top-0 left-0 h-full w-64 bg-green-600 text-white shadow-2xl">
        <!-- Logo Section -->
        <div class="p-6 border-b border-green-500">
            <div class="flex items-center space-x-3">
                <div class="w-12 h-12 rounded-full overflow-hidden bg-white p-1 shadow-lg">
                    <img src="../assets/images/logo.jpg" alt="MediTrack Logo" class="w-full h-full object-cover rounded-full">
                </div>
                <div>
                    <h1 class="text-xl font-bold">MediTrack</h1>
                    <p class="text-xs text-green-100">Admin Panel</p>
                </div>
            </div>
        </div>
        
        <!-- Navigation Menu -->
        <nav class="p-4 space-y-2 overflow-y-auto" style="max-height: calc(100vh - 240px);">
            <a href="admin-dashboard.html" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-green-500">
                <i class="fas fa-th-large w-5"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            <a href="patients.html" class="nav-item active flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-green-500">
                <i class="fas fa-users w-5"></i>
                <span class="font-medium">Patients</span>
            </a>
            <a href="doctors.html" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-green-500">
                <i class="fas fa-user-md w-5"></i>
                <span class="font-medium">Doctors</span>
            </a>
            <a href="appointments.html" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-green-500">
                <i class="fas fa-calendar-check w-5"></i>
                <span class="font-medium">Appointments</span>
            </a>
            <a href="departments.html" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-green-500">
                <i class="fas fa-hospital w-5"></i>
                <span class="font-medium">Departments</span>
            </a>
            <a href="reports.html" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-green-500">
                <i class="fas fa-chart-bar w-5"></i>
                <span class="font-medium">Reports</span>
            </a>
            <a href="settings.html" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-green-500">
                <i class="fas fa-cog w-5"></i>
                <span class="font-medium">Settings</span>
            </a>
        </nav>
        
        <!-- User Info at Bottom -->
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-green-500 bg-green-600">
            <div class="flex items-center space-x-3 mb-3">
                <div class="w-10 h-10 rounded-full bg-green-500 flex items-center justify-center">
                    <i class="fas fa-user-shield text-lg"></i>
                </div>
                <div class="flex-1">
                    <p class="font-semibold text-sm">Admin User</p>
                    <p class="text-xs text-green-100">Administrator</p>
                </div>
            </div>
            <button id="logoutBtn" class="w-full bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center justify-center space-x-2">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>
    
    <!-- Main Content -->
    <div class="md:ml-64 min-h-screen">
        <!-- Top Navigation Bar -->
        <nav class="bg-white shadow-md sticky top-0 z-20">
            <div class="px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <button id="mobileMenuBtn" class="md:hidden text-gray-600 hover:text-green-600">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                    <h2 class="text-xl font-bold text-gray-800">
                        <i class="fas fa-users text-green-600 mr-2"></i>
                        Patients Management
                    </h2>
                    <div class="flex items-center space-x-4">
                        <div class="hidden sm:flex items-center space-x-2 text-gray-600">
                            <i class="fas fa-clock text-green-600"></i>
                            <span id="realTimeClock" class="text-sm font-medium"></span>
                        </div>
                        <button onclick="loadPatients()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition" title="Refresh">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <button class="relative text-gray-600 hover:text-green-600">
                            <i class="fas fa-bell text-xl"></i>
                            <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">3</span>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Content -->
        <div class="p-4 sm:p-6 lg:p-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="stat-card bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500 fade-in">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1">Total Patients</p>
                            <p id="totalPatients" class="text-3xl font-bold text-gray-900">0</p>
                        </div>
                        <div class="bg-green-100 rounded-full p-4">
                            <i class="fas fa-users text-green-500 text-2xl"></i>
                        </div>
                    </div>
                </div>
                
                <div class="stat-card bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500 fade-in">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1">Active Patients</p>
                            <p id="activePatients" class="text-3xl font-bold text-gray-900">0</p>
                        </div>
                        <div class="bg-blue-100 rounded-full p-4">
                            <i class="fas fa-check-circle text-blue-500 text-2xl"></i>
                        </div>
                    </div>
                </div>
                
                <div class="stat-card bg-white rounded-xl shadow-md p-6 border-l-4 border-yellow-500 fade-in">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1">New This Month</p>
                            <p id="newPatients" class="text-3xl font-bold text-gray-900">0</p>
                        </div>
                        <div class="bg-yellow-100 rounded-full p-4">
                            <i class="fas fa-user-plus text-yellow-500 text-2xl"></i>
                        </div>
                    </div>
                </div>
                
                <div class="stat-card bg-white rounded-xl shadow-md p-6 border-l-4 border-purple-500 fade-in">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1">Male / Female</p>
                            <p id="genderSplit" class="text-2xl font-bold text-gray-900">0 / 0</p>
                        </div>
                        <div class="bg-purple-100 rounded-full p-4">
                            <i class="fas fa-venus-mars text-purple-500 text-2xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search and Filter -->
            <div class="bg-white rounded-xl shadow-md p-4 mb-6 fade-in">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2">
                        <div class="relative">
                            <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="searchPatients" placeholder="Search by name, email, or phone..." 
                                class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent"
                                oninput="filterPatients()">
                        </div>
                    </div>
                    <select id="filterGender" class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500" onchange="filterPatients()">
                        <option value="">All Genders</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                    <select id="filterBloodGroup" class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500" onchange="filterPatients()">
                        <option value="">All Blood Groups</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
            </div>

            <!-- Patients Grid -->
            <div id="patientsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Loading State -->
                <div class="col-span-full text-center py-12">
                    <i class="fas fa-spinner fa-spin text-5xl text-green-600 mb-4"></i>
                    <p class="text-gray-600 text-lg">Loading patients...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth-check.js"></script>
    <script>
        let allPatients = [];
        let filteredPatients = [];
        
        // Real-Time Clock
        function updateClock() {
            const now = new Date();
            const options = { 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            };
            const clockElement = document.getElementById('realTimeClock');
            if (clockElement) {
                clockElement.textContent = now.toLocaleString('en-US', options);
            }
        }
        updateClock();
        setInterval(updateClock, 1000);
        
        // Mobile Menu Toggle
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                sidebarOverlay.classList.toggle('hidden');
            });
        }
        
        if (sidebarOverlay) {
            sidebarOverlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                sidebarOverlay.classList.add('hidden');
            });
        }
        
        // Logout Button
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', logout);
        }
        
        // Load Patients
        async function loadPatients() {
            try {
                console.log('Loading patients...');
                
                const response = await fetch('../api/admin/get-patients.php');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                console.log('Patients API Response:', result);
                
                if (result.success) {
                    allPatients = result.patients || [];
                    filteredPatients = allPatients;
                    
                    // Update stats
                    document.getElementById('totalPatients').textContent = result.stats.total;
                    document.getElementById('activePatients').textContent = result.stats.active;
                    document.getElementById('newPatients').textContent = result.stats.new_this_month;
                    document.getElementById('genderSplit').textContent = `${result.stats.male} / ${result.stats.female}`;
                    
                    // Display patients
                    displayPatients(allPatients);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Loaded!',
                        text: `${result.stats.total} patients loaded successfully`,
                        timer: 2000,
                        showConfirmButton: false
                    });
                } else {
                    throw new Error(result.message || 'Failed to load patients');
                }
            } catch (error) {
                console.error('Error loading patients:', error);
                
                document.getElementById('patientsGrid').innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fas fa-exclamation-triangle text-6xl text-red-400 mb-4"></i>
                        <p class="text-gray-800 font-semibold text-lg mb-2">Failed to load patients</p>
                        <p class="text-gray-600 mb-4">${error.message}</p>
                        <button onclick="loadPatients()" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition">
                            <i class="fas fa-redo mr-2"></i>Try Again
                        </button>
                    </div>
                `;
            }
        }
        
        // Display Patients
        function displayPatients(patients) {
            const grid = document.getElementById('patientsGrid');
            
            if (!patients || patients.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <i class="fas fa-users text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-700 font-semibold text-lg mb-2">No patients found</p>
                        <p class="text-gray-500">Try adjusting your search or filters</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = patients.map(patient => `
                <div class="patient-card bg-white border-2 border-gray-200 rounded-xl p-6 shadow-sm">
                    <!-- Profile Image -->
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-16 h-16 rounded-full overflow-hidden bg-gradient-to-br from-green-100 to-green-200 border-4 border-green-500 shadow-lg flex items-center justify-center">
                            ${patient.profile_image_url ? 
                                `<img src="${patient.profile_image_url}" class="w-full h-full object-cover" alt="${patient.full_name}">` :
                                `<i class="fas fa-user text-3xl text-green-600"></i>`
                            }
                        </div>
                        <span class="px-3 py-1 text-xs rounded-full font-semibold ${
                            patient.user_status === 'active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'
                        }">
                            ${patient.user_status ? patient.user_status.toUpperCase() : 'ACTIVE'}
                        </span>
                    </div>
                    
                    <!-- Patient Info -->
                    <h3 class="text-lg font-bold text-gray-800 mb-1">${patient.full_name || 'N/A'}</h3>
                    <p class="text-sm text-gray-600 mb-1">
                        <i class="fas fa-envelope text-green-600 mr-1"></i>
                        ${patient.email || patient.user_email || 'N/A'}
                    </p>
                    <p class="text-sm text-gray-600 mb-3">
                        <i class="fas fa-phone text-green-600 mr-1"></i>
                        ${patient.contact_number || 'N/A'}
                    </p>
                    
                    <!-- Details Grid -->
                    <div class="grid grid-cols-2 gap-2 mb-3 text-sm">
                        <div class="bg-gray-50 p-2 rounded">
                            <p class="text-xs text-gray-500">Age</p>
                            <p class="font-semibold text-gray-800">${patient.age || 'N/A'} years</p>
                        </div>
                        <div class="bg-gray-50 p-2 rounded">
                            <p class="text-xs text-gray-500">Gender</p>
                            <p class="font-semibold text-gray-800">${patient.gender ? patient.gender.charAt(0).toUpperCase() + patient.gender.slice(1) : 'N/A'}</p>
                        </div>
                        <div class="bg-gray-50 p-2 rounded">
                            <p class="text-xs text-gray-500">Blood Group</p>
                            <p class="font-semibold text-red-600">${patient.blood_group || 'N/A'}</p>
                        </div>
                        <div class="bg-gray-50 p-2 rounded">
                            <p class="text-xs text-gray-500">DOB</p>
                            <p class="font-semibold text-gray-800 text-xs">${patient.formatted_dob}</p>
                        </div>
                    </div>
                    
                    <!-- Address -->
                    ${patient.full_address ? `
                    <div class="mb-3">
                        <p class="text-xs text-gray-500 mb-1">
                            <i class="fas fa-map-marker-alt text-green-600 mr-1"></i>Address
                        </p>
                        <p class="text-xs text-gray-700 line-clamp-2">${patient.full_address}</p>
                    </div>
                    ` : ''}
                    
                    <!-- Emergency Contact -->
                    ${patient.emergency_contact_name ? `
                    <div class="mb-3 bg-yellow-50 p-2 rounded">
                        <p class="text-xs text-gray-500 mb-1">
                            <i class="fas fa-phone-alt text-yellow-600 mr-1"></i>Emergency Contact
                        </p>
                        <p class="text-xs font-semibold text-gray-800">${patient.emergency_contact_name}</p>
                        <p class="text-xs text-gray-600">${patient.emergency_contact_number || 'N/A'}</p>
                    </div>
                    ` : ''}
                    
                    <!-- Registered Date -->
                    <div class="text-xs text-gray-500 mb-3">
                        <i class="fas fa-calendar text-green-600 mr-1"></i>
                        Registered: ${patient.formatted_registered}
                    </div>
                    
                    <!-- Actions -->
                    <div class="flex gap-2">
                        <button onclick="viewPatient(${patient.id})" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                            <i class="fas fa-eye mr-1"></i>View
                        </button>
                        <button onclick="editPatient(${patient.id})" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                            <i class="fas fa-edit mr-1"></i>Edit
                        </button>
                    </div>
                </div>
            `).join('');
            
            console.log('Displayed', patients.length, 'patients');
        }
        
        // Filter Patients
        function filterPatients() {
            const searchTerm = document.getElementById('searchPatients').value.toLowerCase();
            const genderFilter = document.getElementById('filterGender').value;
            const bloodFilter = document.getElementById('filterBloodGroup').value;
            
            filteredPatients = allPatients.filter(patient => {
                const matchesSearch = !searchTerm || 
                    (patient.full_name && patient.full_name.toLowerCase().includes(searchTerm)) ||
                    (patient.email && patient.email.toLowerCase().includes(searchTerm)) ||
                    (patient.contact_number && patient.contact_number.includes(searchTerm));
                
                const matchesGender = !genderFilter || patient.gender === genderFilter;
                const matchesBlood = !bloodFilter || patient.blood_group === bloodFilter;
                
                return matchesSearch && matchesGender && matchesBlood;
            });
            
            displayPatients(filteredPatients);
        }
        
        // View Patient Details
        function viewPatient(id) {
            const patient = allPatients.find(p => p.id == id);
            if (!patient) return;
            
            Swal.fire({
                title: patient.full_name,
                html: `
                    <div class="text-left space-y-3">
                        <div class="flex items-center justify-center mb-4">
                            <div class="w-24 h-24 rounded-full overflow-hidden bg-green-100 border-4 border-green-500">
                                ${patient.profile_image_url ? 
                                    `<img src="${patient.profile_image_url}" class="w-full h-full object-cover">` :
                                    `<div class="w-full h-full flex items-center justify-center"><i class="fas fa-user text-4xl text-green-600"></i></div>`
                                }
                            </div>
                        </div>
                        <p><strong>Email:</strong> ${patient.email || 'N/A'}</p>
                        <p><strong>Phone:</strong> ${patient.contact_number || 'N/A'}</p>
                        <p><strong>Age:</strong> ${patient.age || 'N/A'} years</p>
                        <p><strong>Gender:</strong> ${patient.gender || 'N/A'}</p>
                        <p><strong>Blood Group:</strong> ${patient.blood_group || 'N/A'}</p>
                        <p><strong>Date of Birth:</strong> ${patient.formatted_dob}</p>
                        <p><strong>Address:</strong> ${patient.full_address || 'N/A'}</p>
                        ${patient.emergency_contact_name ? `
                        <div class="bg-yellow-50 p-3 rounded mt-3">
                            <p class="font-semibold text-yellow-800 mb-2">Emergency Contact</p>
                            <p><strong>Name:</strong> ${patient.emergency_contact_name}</p>
                            <p><strong>Phone:</strong> ${patient.emergency_contact_number || 'N/A'}</p>
                        </div>
                        ` : ''}
                        ${patient.allergies ? `<p><strong>Allergies:</strong> ${patient.allergies}</p>` : ''}
                        ${patient.medical_history ? `<p><strong>Medical History:</strong> ${patient.medical_history}</p>` : ''}
                        <p class="text-sm text-gray-500 mt-3">Registered: ${patient.formatted_registered}</p>
                        <p class="text-sm text-gray-500">Last Login: ${patient.formatted_last_login}</p>
                    </div>
                `,
                width: '600px',
                confirmButtonColor: '#10b981'
            });
        }
        
        // Edit Patient (placeholder)
        function editPatient(id) {
            Swal.fire({
                icon: 'info',
                title: 'Edit Patient',
                text: 'Patient editing feature coming soon!',
                confirmButtonColor: '#10b981'
            });
        }
        
        // Logout
        function logout() {
            Swal.fire({
                title: 'Logout?',
                text: 'Are you sure you want to logout?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Yes, logout'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '../api/auth/logout.php';
                }
            });
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadPatients();
            
            // Auto-refresh every 30 seconds
            setInterval(loadPatients, 30000);
        });
    </script>
</body>
</html>
