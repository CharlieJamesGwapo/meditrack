<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MediTrack</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/logo.jpg">
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        h1, h2, h3 {
            font-family: 'Poppins', sans-serif;
        }
        
        .login-gradient {
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #ecfdf5 100%);
        }
        
        .logo-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(5, 150, 105, 0.3);
            border: 3px solid #10b981;
            animation: logoFloat 3s ease-in-out infinite;
        }
        
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e5e7eb;
        }
        
        .input-field:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(5, 150, 105, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(5, 150, 105, 0.5);
        }
    </style>
</head>
<body class="login-gradient min-h-screen">
    <div class="min-h-screen flex items-center justify-center py-8 px-4">
        <div class="max-w-md w-full">
            <!-- Logo & Header -->
            <div class="text-center mb-8">
                <a href="login.html" class="inline-block mb-6">
                    <div class="logo-container mx-auto">
                        <img src="../assets/images/logo.jpg" alt="MediTrack Logo">
                    </div>
                </a>
                <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Forgot Password</h1>
                <p class="text-gray-600 text-sm">Enter your email to receive an OTP</p>
            </div>

            <!-- Form Card -->
            <div class="card py-8 px-6 md:px-8">
                <div class="mb-6 text-center">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                        <i class="fas fa-key text-green-600 text-2xl"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-900 mb-2">Reset Your Password</h2>
                    <p class="text-sm text-gray-600">We'll send a 6-digit OTP to your registered email address</p>
                </div>

                <form id="forgotPasswordForm" class="space-y-5">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-envelope text-gray-400"></i>
                            </div>
                            <input id="email" name="email" type="email" required 
                                   class="input-field appearance-none block w-full pl-10 pr-3 py-3 rounded-xl placeholder-gray-400 focus:outline-none"
                                   placeholder="Enter your registered email">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn"
                            class="btn-primary w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-xl text-base font-bold text-white focus:outline-none">
                        <span id="submitText">
                            <i class="fas fa-paper-plane mr-2"></i>
                            Send OTP
                        </span>
                        <span id="submitSpinner" class="hidden">
                            <i class="fas fa-spinner fa-spin mr-2"></i>
                            Sending...
                        </span>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a href="login.html" class="text-sm text-green-600 hover:text-green-500 font-medium">
                        <i class="fas fa-arrow-left mr-1"></i>
                        Back to Login
                    </a>
                </div>

                <!-- Info Box -->
                <div class="mt-6 p-4 bg-blue-50 rounded-xl border border-blue-200">
                    <div class="flex items-start gap-3">
                        <i class="fas fa-info-circle text-blue-600 mt-1"></i>
                        <div class="text-xs text-blue-800">
                            <p class="font-semibold mb-1">Important:</p>
                            <ul class="list-disc list-inside space-y-1">
                                <li>OTP will be valid for 10 minutes</li>
                                <li>Check your spam folder if you don't see the email</li>
                                <li>You can request a new OTP after expiration</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const submitSpinner = document.getElementById('submitSpinner');

        // Auto-setup database on page load
        async function setupDatabase() {
            try {
                const response = await fetch('../setup-password-reset-auto.php');
                const data = await response.json();
                console.log('Database setup:', data);
            } catch (error) {
                console.error('Setup check failed:', error);
            }
        }

        // Run setup check on page load
        setupDatabase();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();

            if (!email) {
                Swal.fire({
                    icon: 'error',
                    title: 'Email Required',
                    text: 'Please enter your email address',
                    confirmButtonColor: '#10b981'
                });
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Invalid Email',
                    text: 'Please enter a valid email address',
                    confirmButtonColor: '#10b981'
                });
                return;
            }

            // Show loading state
            Swal.fire({
                title: 'Sending OTP...',
                html: 'Please wait while we send the verification code to your email',
                allowOutsideClick: false,
                allowEscapeKey: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            // Disable form
            submitBtn.disabled = true;
            submitText.classList.add('hidden');
            submitSpinner.classList.remove('hidden');

            try {
                const response = await fetch('../api/auth/request-otp.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'OTP Sent Successfully!',
                        html: `
                            <div class="text-left">
                                <p class="text-lg mb-3">A 6-digit verification code has been sent to:</p>
                                <p class="text-green-600 font-bold text-xl mb-3">${email}</p>
                                <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm">
                                    <p class="font-semibold text-blue-800 mb-2">📧 Check your email:</p>
                                    <ul class="list-disc list-inside text-blue-700 space-y-1">
                                        <li>Look in your inbox for "Password Reset OTP"</li>
                                        <li>Check spam/junk folder if not found</li>
                                        <li>Code expires in 10 minutes</li>
                                    </ul>
                                </div>
                            </div>
                        `,
                        confirmButtonText: 'Continue to Verification',
                        confirmButtonColor: '#10b981',
                        allowOutsideClick: false
                    }).then(() => {
                        // Store email in sessionStorage and redirect to verify page
                        sessionStorage.setItem('reset_email', email);
                        window.location.href = 'verify-otp.html';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Failed to Send OTP',
                        text: data.message || 'Unable to send OTP. Please try again.',
                        confirmButtonColor: '#10b981'
                    });
                }
            } catch (error) {
                console.error('Error:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'Network Error',
                    html: '<p>Unable to connect to the server.</p><p class="text-sm text-gray-600 mt-2">Please check your internet connection and try again.</p>',
                    confirmButtonColor: '#10b981'
                });
            } finally {
                submitBtn.disabled = false;
                submitText.classList.remove('hidden');
                submitSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
