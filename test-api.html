<!DOCTYPE html>
<html>
<head>
    <title>Test MediTrack APIs</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/logo.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/logo.jpg">
    <link rel="manifest" href="assets/images/site.webmanifest">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>MediTrack API Test</h1>
    <button onclick="testAllAPIs()">Test All APIs</button>
    <div id="results"></div>

    <script>
        async function testAPI(name, url) {
            const resultDiv = document.getElementById('results');
            const testDiv = document.createElement('div');
            testDiv.className = 'test';
            testDiv.innerHTML = `<h3>${name}</h3><p>Testing ${url}...</p>`;
            resultDiv.appendChild(testDiv);

            try {
                const response = await fetch(url);
                const data = await response.json();
                testDiv.className = 'test success';
                testDiv.innerHTML = `
                    <h3>✅ ${name}</h3>
                    <p><strong>Status:</strong> ${response.status} ${response.statusText}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                testDiv.className = 'test error';
                testDiv.innerHTML = `
                    <h3>❌ ${name}</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            }
        }

        async function testAllAPIs() {
            document.getElementById('results').innerHTML = '';
            await testAPI('Dashboard Stats', 'api/admin/stats.php');
            await testAPI('Recent Appointments', 'api/admin/recent-appointments.php');
            await testAPI('System Activity', 'api/admin/activity.php');
            await testAPI('All Users', 'api/admin/users.php');
            await testAPI('All Appointments', 'api/admin/appointments.php');
        }
    </script>
</body>
</html>
